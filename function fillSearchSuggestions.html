<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <h2>仮の検索欄</h2>
    <input type="text" name="" value="検索できません。ボタンのクリックイベントをJSで取得">
    <br>
    <input type="submit" value="検索" id="Searchbutton">

    <h2>仮の登録フォーム</h2>

    <div>タイトル :<input type="text" name="" id="" data-suggestion="title"></div>

    <div>ISBN :<input type="text" name="" id="" data-suggestion="isbn"></div>

    <div>著者 :<input type="text" name="" id="" data-suggestion="author"></div>

    <h3>仮の検索結果(JSの配列にあると仮定)</h3>

    <pre>
    const dummySearchResults = [
    {
        title: "星の王子さま",
        isbn: "9784〜",
        author: "サンテグジュペリ"
    }
    ];
    </pre>

</body>

<script>
    "use strict";
    const dummySearchResults = [
        {
            title: "星の王子さま",
            isbn: "9784〜",
            author: "サンテグジュペリ"
        }
    ];


    document.getElementById('Searchbutton').addEventListener('click', () => {

        document.querySelectorAll('input[data-suggestion]').forEach(input => {
            input.value = "";
        });

        for (const key in dummySearchResults[0]) {
            // console.log(key);
            // console.log(dummySearchResults[0][key]);

            document.querySelector(`input[data-suggestion="${key}"]`).value = dummySearchResults[0][key];
        }
    })

     /**
     * 指定したIDの要素にクリックイベントを登録し、検索候補をinputに自動入力する。
     * 
     *
     * @param {string} clickedId - クリックイベントを設定する要素のid属性値
     * @param {Array<Object>} arraySearchResults - 検索結果の配列（各要素はdata-suggestionの値をキーに持つオブジェクト）
     * @returns {void}
     */
    function fillSearchSuggestions(clickedId,arraySearchResults) {
        document.getElementById(`${clickedId}`).addEventListener('click', () => {

        document.querySelectorAll('input[data-suggestion]').forEach(input => {
            input.value = "";
        });

        for (const key in arraySearchResults[0]) {
            document.querySelector(`input[data-suggestion="${key}"]`).value = arraySearchResults[0][key];
        }
    })
    }
</script>

</html>
